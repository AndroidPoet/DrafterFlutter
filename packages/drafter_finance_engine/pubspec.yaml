name: drafter_finance_engine
description: >-
  Internal engine for the drafter_finance trading charts — most apps should
  depend on drafter_finance instead. Pure Dart (no Flutter): scales, indicators,
  hit-testing and a platform-agnostic display list.
version: 0.1.1
homepage: https://github.com/AndroidPoet/DrafterFlutter
repository: https://github.com/AndroidPoet/DrafterFlutter
issue_tracker: https://github.com/AndroidPoet/DrafterFlutter/issues
topics:
  - finance
  - charts
  - trading
  - candlestick
  - indicators

environment:
  sdk: ^3.10.0

# Pure Dart — runs everywhere Dart does.
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

resolution: workspace

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
