  smooth Catmull-Rom curves, soft gradient fills and a left-to-right reveal.
version: 0.2.0
homepage: https://github.com/AndroidPoet/DrafterFlutter
repository: https://github.com/AndroidPoet/DrafterFlutter
issue_tracker: https://github.com/AndroidPoet/DrafterFlutter/issues
documentation: https://github.com/AndroidPoet/DrafterFlutter#readme

topics:
