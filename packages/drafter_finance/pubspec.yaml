name: drafter_finance
description: >-
  Native, multiplatform trading charts for Flutter (candlestick, OHLC, line,
  area, baseline, histogram, volume) with indicators and a magnet crosshair —
  a thin CustomPainter over the pure drafter_finance_engine.
version: 0.1.0
homepage: https://github.com/AndroidPoet/DrafterFinanceFlutter
repository: https://github.com/AndroidPoet/DrafterFinanceFlutter
issue_tracker: https://github.com/AndroidPoet/DrafterFinanceFlutter/issues
topics:
  - finance
  - charts
  - trading
  - candlestick
  - indicators

environment:
  sdk: ^3.10.0
  flutter: ">=3.10.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  drafter_finance_engine: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
