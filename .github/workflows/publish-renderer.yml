# Automated pub.dev publishing for the Flutter renderer package.
#
# Triggers on tags like `drafter_finance-v0.1.0` (the `_engine` package has its
# own pattern, so this does NOT match `drafter_finance_engine-v*`). pub.dev's
# automated publishing must be enabled for this package with repository
# `AndroidPoet/DrafterFinanceFlutter` and tag pattern `drafter_finance-v{{version}}`.
#
# Publish the engine first and let it go live — this package depends on
# `drafter_finance_engine: ^0.1.0`, which pub.dev verifies exists at publish time.
name: publish drafter_finance

on:
  push:
    tags:
      - 'drafter_finance-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for pub.dev OIDC authentication
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      # Resolve from the workspace root — pub refuses `get` inside a member dir.
      - run: flutter pub get
      - run: flutter pub publish --force
        working-directory: packages/drafter_finance
