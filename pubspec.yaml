# Pub workspace root for the Drafter Flutter charting libraries.
#
# A monorepo (the supabase-kmp / Maven multi-module model) holding several
# independently published packages that share one lockfile:
#
#   packages/drafter                  the ~27-chart general charting library
#   packages/drafter_finance_engine   pure-Dart trading-chart engine (no Flutter)
#   packages/drafter_finance          Flutter trading charts over that engine
#
# Each package versions and releases on its own tag (drafter-v*,
# drafter_finance-v*, drafter_finance_engine-v*).
name: drafter_workspace
publish_to: none

environment:
  sdk: ^3.10.0

workspace:
  - packages/drafter
  - packages/drafter/example
  - packages/drafter_finance_engine
  - packages/drafter_finance
  - packages/drafter_finance/example
